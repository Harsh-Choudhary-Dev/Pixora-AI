<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixora | Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="dark-toggle" onclick="toggleDarkMode()">🌙 Toggle</div>

<div class="container">

    <div class="left">
        <h1>Pixora</h1>
        <p>Relive your memories intelligently.</p>
    </div>

    <div class="right">
        <div class="card">
            <h2>Welcome Back</h2>

            <!-- ❌ removed form action -->
            <div class="input-group">
                <input id="email" type="email" placeholder="Email" required />
            </div>

            <div class="input-group">
                <input id="password" type="password" placeholder="Password" required />
            </div>

            <button class="btn" onclick="login()">Login</button>

            <!-- error message -->
            <div id="error-msg" style="color:red; margin-top:10px;"></div>

            <div class="footer">
                Don’t have an account?
                <a href="/signup.html">Create one</a>
            </div>
        </div>
    </div>

</div>

<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }

    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("error-msg");

        errorDiv.innerText = "";

        try {
            const response = await fetch("/api/auth/authenticate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                // Debug: Log the response data
                console.log("Login response data:", data);
                
                // Check if token exists in response
                if (data.response) {
                    localStorage.setItem("token", data.response);
                    console.log("Token saved successfully");
                    alert("Login successful!");
                    window.location.href = "/dashboard.html";
                    
                
                } else {
                    console.error("No token found in response:", data);
                    errorDiv.innerText = "Login successful but no token received. Please contact support.";
                }
            } else {
                errorDiv.innerText = data.message || data.error || "Login failed";
            }

        } catch (error) {
            errorDiv.innerText = "Server error. Try again.";
        }
    }
</script>

</body>
</html>
